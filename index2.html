<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="BinarioDecimal.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
</head>
<body class="d-flex flex-column min-vh-100">

    <header>
        <h1 class="fw-bold text-center">Conversor de Binário para Decimal</h1>
    </header>

    <main class="flex-grow-1">
        <div class="container">
            <div class="row">
                <h5>Digite o valor em binário:</h5>
            </div>
            <div class="row">
                <input type="number" id="numeroBinario">
            </div>
            <div class="row mt-2">
                <div class="alert alert-danger d-none" role="alert" id="entradaVazia"></div>
            </div>
            <div class="row mt-2">
                <button onclick="BinarioParaDecimal()" type="button" class="btn btn-primary">Converter</button>
            </div>
            <div class="row mt-2">
                <div class="card d-none" style="width: 18rem" id="card">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" id="numeroDigitado"></li>
                        <li class="list-group-item" id="resultado"></li>
                    </ul>
                    </div>
            </div>
            <div class="row mt-2">
                <button onclick="Repetir()" type="button" class="btn btn-primary d-none" id="botaoRepetir">Converter outro número</button>
            </div>
            
            
        </div>
    </main>
    
    <footer class="bg-primary text-light text-center p-3 mt-5">
        © 2026 | Conversor Binário para Decimal
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
