<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Binário para Decimal</title>
    <script src="BinarioDecimal.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="py-4">
        <h1 class="fw-bold text-center">Conversor de Binário para Decimal</h1>
    </header>

    <main class=" d-flex flex-column align-items-center">
        

            <div class="card shadow p-3" style="width: 36rem">

                <div class="card-body">

                    <h5>Digite o valor em binário:</h5>

                    <input type="text" id="numeroBinario" class="form-control" placeholder="Ex: 1010">

                    <div>
                        <div class="alert alert-danger d-none mt-2" role="alert" id="entradaVazia"></div>
                    </div>

                    <button onclick="BinarioParaDecimal()" type="button" class="btn btn-primary w-100 mt-3">Converter</button>

                    <div class="card d-none mt-3 w-100"  id="cardResultado">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item" id="numeroDigitado"></li>
                            <li class="list-group-item" id="resultado"></li>
                        </ul>
                    </div>

                    <button onclick="Repetir()" type="button" class="btn btn-primary d-none mt-3 w-100" id="botaoRepetir">Converter outro número</button>

                </div>

            </div>

            <div>
                <button onclick="window.location.href='DecimalBinario.html'" type="button" class="btn btn-success  mt-3 w-100" id="botaoRepetir">Converter Decimal para Binário</button>
            </div>

    </main>
    
    <footer class="bg-primary text-light text-center py-3 mt-auto">
        © 2026 | Conversor Binário para Decimal
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
